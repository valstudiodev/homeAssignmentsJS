                document.write(`<h2 style="margin-bottom:50px;">

                const getSumOfFourNumber = (a, b, c, d) => a + b + c + d

                document.write(`Sum result: ${getSumOfFourNumber(2, 2, 2, 2)} <br>`);

                // function getMuiltipleOfFourNum(num1, num2, num3, num4) {

                const getAvgOfFourNum = (a, b, c, d) => (a + b + c + d) / 4

                document.write(`Avarage number: ${getAvgOfFourNum(13, 34, 26, 42).toFixed(2)} <br>`);

                // function getAvgOfFourNum(num1, num2, num3, num4) {

                // =====================================================================
                function getMinNumber(num1, num2, num3, num4) {
                  let minNum = num1
                  if (num2 < num1) minNum = num2
                  if (num3 < num1) minNum = num3
                  if (num4 < num1) minNum = num4
                  return minNum
                }

                document.write(`Minimum number: ${getMinNumber(23, 56, 13, 24)} <br>`);
