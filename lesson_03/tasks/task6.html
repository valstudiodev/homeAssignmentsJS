<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 6</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 6</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>З клавіатури вводиться номер дня тижня. Вивести на екран назву
                дня.
              </p>
            </div>

            <div class="page-task__script">
              <script>

                let dayOfWeek = parseInt(prompt('Enter the day of week,please', '1'))

                switch (dayOfWeek) {
                  case 1: document.write('Monady')
                    break;
                  case 2: document.write('Tuesday')
                    break;
                  case 3: document.write('Wednesday')
                    break;
                  case 4: document.write('Thursday')
                    break;
                  case 5: document.write('Friday')
                    break;
                  case 6: document.write('Saturday')
                    break;
                  case 7: document.write('Sunday')
                    break
                  default:
                    alert('Sorry, this day does not exist!!!')
                }

              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>
  </body>
</html>
