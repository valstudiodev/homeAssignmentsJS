            <div class="page-task__script">
              <script>

                document.write(`<h2 style="margin-bottom:50px;">Створити функцію, яка за номером дня дозволяє з’ясувати чи є цей день робочим.</h2>`);

                function isWorkingDay(day) {
                  switch (day) {
                    case 1: return "Working day"
                    case 2: return "Working day"
                    case 3: return "Working day"
                    case 4: return "Working day"
                    case 5: return "Working day"
                    case 6: return "Day off"
                    case 7: return "Day off"
                    default:
                      throw new Error("Error");
                  }
                }
                document.write(`${isWorkingDay(7)} `);

              </script>
