<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 5</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 5</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>З клавіатури вводиться назва категорії водія (А-мотоцикл, В-легковий
                автомобіль, С-вантажний автомобіль). Вивести на екран назву
                транспортного засобу, яким він може керувати.
              </p>
            </div>

            <div class="page-task__script">
              <script>

                let category = prompt('Enter your category, please', 'A')

                switch (category) {
                  case "A": alert('You can drive by Motorcycle!')
                    break;
                  case "B": alert('You can drive by Automobile!')
                    break;
                  case "C": alert('You can drive by Truck!')
                    break
                  default:
                    alert('You can just walk!')
                    break;
                }

              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>
  </body>
</html>
