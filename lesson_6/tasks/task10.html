<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 10</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 10</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>З клавіатури вводиться вартість одиниці товару. Поки користувач не введе суму грошей, яка достатня для
                купівлі товару
                або не відмовиться від купівлі давати можливість вводити суму грошей.
              </p>
            </div>

            <div class="page-task__script">
              <script>



                const productPrice = parseFloat(prompt("Введіть вартість товару:", "100"));
                let userMoney = 0;

                if (isNaN(productPrice) || productPrice <= 0) {
                  alert("Ціна введена некоректно. Оновіть сторінку.");
                }

                while (userMoney < productPrice) {
                  let remaining = productPrice - userMoney;
                  let input = prompt(`Ціна: ${productPrice}. Залишилось внести: ${remaining}\n Введіть суму грошей:`);

                  if (input === null) {
                    alert("Ви відмовились від купівлі. Гроші повернуто.");
                    break;
                  }

                  let amount = parseFloat(input);

                  if (!isNaN(amount) && amount > 0) {
                    userMoney += amount;
                  } else {
                    alert("Будь ласка, введіть коректну суму (число).");
                  }
                }

                if (userMoney >= productPrice) {
                  let change = userMoney - productPrice;
                  alert(`Дякуємо за покупку! Ваша решта: ${change.toFixed(2)}`);
                }

              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson4.js"></script>
  </body>
</html>
