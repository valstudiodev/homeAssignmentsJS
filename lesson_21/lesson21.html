      body {

      .btn {

        padding-inline: 20px;
        border: 1px solid #000;
        border-radius: 20px;
        color: red;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.4s, background-color 0.4s;
        will-change: transform;
      }

      .btn:hover {
        background-color: lightblue;
      }

      .card {
        width: 300px;
        height: 300px;
        background-color: coral;
        border-radius: 10px;
