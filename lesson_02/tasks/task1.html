<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 1</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 1</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>Знайти суму, добуток та частку двох дійсних чисел. Результат вивести у формі таблиці
              </p>
            </div>

            <div class="page-task__script">
              <script>

                let numberFirst = parseFloat(prompt("Enter first number"))
                let numberSecond = parseFloat(prompt("Enter second number"))

                let sum = numberFirst + numberSecond
                let multiplication = numberFirst * numberSecond
                let division = numberFirst / numberSecond
                document.write(`<h2 style="color:red;margin-bottom:10px">Результати обчислень</h2>`);
                document.write(
                  `<table style="border-collapse: collapse;border:1px solid black; width: 300px;">
                      <tr style="border:1px solid black;">
                        <td>Result summary:</td>
                        <td>${sum}</td>
                      </tr>
                      <tr style="border:1px solid black;">
                        <td>Result  multiplication:</td>
                        <td>${multiplication}</td>
                      </tr>
                      <tr style="border:1px solid black;">
                        <td>Result division:</td>
                        <td>${division}</td>
                      </tr>
                    </table>
                  `
                )
              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>
  </body>
</html>
