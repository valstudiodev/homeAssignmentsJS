<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 2</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 2</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>З клавіатури вводитяться числа поки не буде введено 0. Знайти добуток чисел.</p>
              <p>З клавіатури поступово вводяться символи поки не буде введено символ «а». Вивести рядок символів у
                зворотному порядку.</p>
            </div>

            <div class="page-task__script">
              <script>


                let totalScore = 1
                let userNum = parseInt(prompt('Enter the number', '2'))

                while (userNum !== 0) {


                  if (!isNaN(userNum)) {
                    totalScore *= userNum
                  }
                  userNum = parseInt(prompt('Enter the number', '2'))
                }
                alert(`Your total score is ${totalScore}`)



              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson4.js"></script>
  </body>
</html>
