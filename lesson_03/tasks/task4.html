<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 4</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task </h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>З клавіатури вводиться вік людини. Вивести на екран ким він є
                (дитиною у садочку, школярем, студентом, працівником, пенсіонером).
              </p>
            </div>

            <div class="page-task__script">
              <script>

                let ageOfPerson = parseInt(prompt('Enter your age, please', '35'))

                if (ageOfPerson <= 0 || ageOfPerson > 110)
                  document.write('Sorry, enter the correct number,please!')
                else if (ageOfPerson <= 6)
                  document.write(`You are a kid! Your age is: ${ageOfPerson} `);
                else if (ageOfPerson <= 18)
                  document.write(`You are a schoolchild! Your age is: ${ageOfPerson} `);
                else if (ageOfPerson <= 25)
                  document.write(`You are a student! Your age is: ${ageOfPerson} `);
                else if (ageOfPerson <= 65)
                  document.write(`You are a worker! Your age is: ${ageOfPerson}`);
                else
                  document.write(`You are a pensioner! Your age is: ${ageOfPerson} `);
              </script>

            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>
  </body>
</html>
