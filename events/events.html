<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <style>
      body.active {
        background-color: #000;
      }

      .page {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 50px;
      }

      .button {
        background-color: coral;
        padding-block: 10px;
        padding-inline: 24px;
        border-radius: 8px;
        border: none;
        font-weight: 500;
        color: white;
        font-size: 22px;
      }

      .box {
        width: 100px;
        height: 100px;
        background-color: grey;
        text-align: center;
        align-content: center;
        font-size: 20px;
      }

      .box[data-id='box'] {
        font-size: 50px;
      }

      .card {
        background-color: lightcyan;
        padding: 20px;
      }

      .wrap-buttons {
        display: flex;
        align-items: center;
        gap: 20px;
      }

    </style>
  </head>

  <body>
    <div class="wrapper">

      <main class="page" style="padding: 50px;">

        <button class="button">Click</button>

        <div class="box">Box</div>

        <div class="wrap">
          <button data-action="save" class="btn-save">Save</button>
          <button data-action="delete" class="btn-delete">Delete</button>
        </div>

        <div class="wrap">
          <div class="card" data-category="sport">Sport</div>
          <div class="card" data-category="music">Music</div>
        </div>


      </main>

      <footer></footer>
    </div>


    <script src="../javascript/events.js"></script>
  </body>
</html>
