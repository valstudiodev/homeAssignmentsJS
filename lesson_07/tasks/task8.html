<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 8</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 8</h1>
          <div class="page-task__inner">

            <div class="page-task__script">
              <script>

                document.write(`<h2 style="margin-bottom:50px;">
                   Створити функцію, яка виводить банер (у функцію передаються: зображення, заголовок та посилання, <br>
                   куди переходимо при кліку на зображення .
                </h2>`);

                function createBanner(imagePath, title, linkUrl) {

                  const bannerHtml = `
                    <div style="width:400px;display:flex;flex-direction:column;align-items:center;gap:20px">
                      <a href="${linkUrl}" target="_blank" style="display:block">
                        <img src="../img/${imagePath}.jpg" alt="Smiley picture">
                      </a>
                      <h3 style="text-align:center;font-size:24px">${title}</h3>
                    </div>
                  `
                  return bannerHtml;
                }

                const myBanner = createBanner('img2', 'Smiley', 'https://en.wikipedia.org/wiki/Smiley');

                document.write(myBanner);

              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson7.js"></script>
  </body>
