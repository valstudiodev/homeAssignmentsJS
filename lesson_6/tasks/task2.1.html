<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 2</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 2</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>З клавіатури поступово вводяться символи поки не буде введено символ «а». Вивести рядок символів у
                зворотному порядку.</p>
            </div>

            <div class="page-task__script">
              <script>


                let currentChar = prompt('Enter a symbol', 'g')
                let fullString = ''
                let reversed = ''

                while (currentChar !== 'a') {
                  fullString += currentChar
                  currentChar = prompt('Enter a symbol', 'g')
                }
                reversed = fullString.split("").reverse().join("")
                alert(`Your reversed string is "${reversed}"`)



              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson4.js"></script>
  </body>
</html>
