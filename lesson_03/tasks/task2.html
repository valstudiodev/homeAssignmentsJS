<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 2</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 2</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>З клавіатури вводиться ціна товару і кількість грошей. Якщо грошей
                не вистачає то відмовляємо у покупці, інакше, якщо ще залишаються
                гроші, то пропонуємо купити лотерею за 4 грн.</p>
            </div>

            <div class="page-task__script">
              <script>

                const itemPrice = parseFloat(prompt('Enter the item price, please!', '100'))
                const userMoney = parseFloat(prompt('Enter the amount of money, please!', '130'))
                const lotteryPrice = 4

                if (userMoney < itemPrice) {
                  const moneyRequired = itemPrice - userMoney
                  document.write(`You do not have enouhg money!!! You need ${moneyRequired}$`);
                } else {
                  const moneyChange = userMoney - itemPrice

                  if (moneyChange > 0) {
                    if (moneyChange >= lotteryPrice) {
                      document.write(`You change ${moneyChange} $ of money! You can buy lottery for ${lotteryPrice}$ `);
                    } else
                      document.write(`Your change ${moneyChange} of money!`)
                  }
                  else
                    document.write(`Thanks for shopping!!!`);
                }

              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>
  </body>
</html>
