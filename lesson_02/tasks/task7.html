<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 7</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 7</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>Знайти суму випадкового номера місяця (від 1 до 12) та випадкового номера дня
                (від
                0 до 6)</p>

            </div>

            <div class="page-task__script">
              <script>

                let months = 12
                let days = 6

                let randomMonth = Math.floor(Math.random() * months + 1)
                document.write(`Month: ${randomMonth} <br>`)

                let randomDay = Math.floor(Math.random() * days + 1)
                document.write(`Day: ${randomDay}`)
              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>
  </body>
</html>
