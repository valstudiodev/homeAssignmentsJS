<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 1</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 1</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>Вивести з використанням циклів маркований список з випадковими числами (1-100).
                Кількість випадкових
                чисел вводиться
                користувачем.
              </p>
            </div>

            <div class="page-task__script">
              <script>

                if (confirm('Почати тестування?')) {
                  const MIN_NUMBER = 0
                  const MAX_NUMBER = 100

                  let userNumber = parseFloat(prompt('Enter the amount of tne numbers,please', '10'))

                  document.write(`<ul>`);

                  for (let i = 0; i < userNumber; i++) {
                    let randomNumber = MIN_NUMBER + Math.floor(Math.random() * (MAX_NUMBER - MIN_NUMBER + 1))
                    document.write(`<li>${randomNumber}</li>`);
                  }

                  document.write(`</ul>`);
                }



              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson4.js"></script>
  </body>
</html>
