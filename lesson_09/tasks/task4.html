<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 4</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 4</h1>
          <div class="page-task__inner">

            <div class="page-task__script">
              <script>

                document.write(`<h2 style="margin-bottom:50px;">
                      Дано масив елементів. Вивести на екран елементи, що більші за 100
                  </h2>
                `);


                function getInputNumbers(count) {
                  let arrNum = []

                  for (let i = 0; i < count; i++) {
                    const inputNum = prompt('Enter the number!', '100')
                    if (inputNum === null) break
                    arrNum.push(Number(inputNum))
                  }
                  return arrNum
                }
                const inputNumbers = getInputNumbers(3)

                for (const num of inputNumbers) {
                  if (num > 100) document.write(`The numbers more than 100 : ${num} <br>`)
                }



              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson8.js"></script>
  </body>
</html>
