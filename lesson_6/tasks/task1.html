<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 1</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 1</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>З клавіатури вводитяться числа поки не буде введено 0. Знайти суму чисел.</p>
            </div>

            <div class="page-task__script">
              <script>


                let userNum
                let totalScore = 0

                while (userNum !== 0) {
                  userNum = parseInt(prompt('Enter the number', '2'))

                  if (!isNaN(userNum)) {
                    totalScore += userNum
                  }

                }
                alert(`Your total score is ${totalScore}`)

              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson4.js"></script>
  </body>
</html>
