<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 16</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 16</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>Користувач поступово вводить прибуток магазину за кожен день протягом N тижнів. Знайти загальну
                величину прибутку та
                вивести величину прибутку протягом кожного окремого тижня.
              </p>
            </div>

            <div class="page-task__script">
              <script>

                if (confirm('Почати тестування?')) {

                  let totalProfit = 0

                  let totalWeeks = parseFloat(prompt('Enter the amount of weeks', '2'))

                  for (let week = 1; week <= totalWeeks; week++) {
                    let weekProfit = 0
                    for (let day = 1; day <= 7; day++) {
                      let incomeDay = parseFloat(prompt(`Week ${week}, Day ${day}`))

                      weekProfit += incomeDay
                      totalProfit += incomeDay

                    }
                    document.write(`Week profit ${week} - ${weekProfit} <br>`);
                  }

                  document.write(`Total profit ${totalProfit} <br> `);

                }

              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson4.js"></script>
  </body>
</html>
