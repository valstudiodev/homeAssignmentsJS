            <div class="page-task__script">
              <script>

                document.write(`<h2 style="margin-bottom:50px;">Створити функцію, яка за номером місяця повертає пору року, до якої
                    відноситься цей місяць.</h2>`);

                function getPeriodOfYear(month) {
                  let season
                  switch (month) {
                    case 12:
                    case 1:
                    case 2: season = "Winter";
                      break;
                    case 3:
                    case 4:
                    case 5: season = "Spring";
                      break;
                    case 6:
                    case 7:
                    case 8: season = "Summer";
                      break;
                    case 9:
                    case 10:
                    case 11: season = "Autumn";
                      break;
                    default:
                      throw new Error("Error");
                  }
                  return season
                }
                document.write(`The season ${getPeriodOfYear(2)}`)
              </script>
            </div>

          </div>
        </div>
