<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task 6</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task 6</h1>
          <div class="page-task__inner">

            <div class="page-task__script">
              <script>

                document.write(`<h2 style="margin-bottom:50px;">
                      Дано масив елементів. Усі елементи, які більші за перший елемент помножити на 2
                  </h2>
                `);


                const arrNumbers = [2, 5, 6, 3, 8, 9, 23, 16, 27]
                const firstElement = arrNumbers[0]

                arrNumbers.forEach((num, index) => {
                  if (index > 0 && num > firstElement) {
                    arrNumbers[index] = num * 2;
                  }
                });
                document.write(`${arrNumbers}`)





              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson8.js"></script>
  </body>
