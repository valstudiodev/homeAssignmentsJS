    <style>
      .header {
        background-color: grey;
      }

      .scroll-value {
        font-size: 60px;
      }

      .progress {
        position: fixed;
        top: 0;
        left: 0;

        width: 0%;
        height: 5px;

        background: linear-gradient(90deg,
            #00f5ff,
            #7b2dff,
            #ff2da1);

        z-index: 1000;

        transition: width 0.1s linear;

        box-shadow:
          0 0 10px rgba(0, 245, 255, .7),
          0 0 20px rgba(123, 45, 255, .5);
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #16a085;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      #preloader.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        /* Колір фону лоадера */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        /* Повинен бути вище за всі інші елементи */
        opacity: 1;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      .page-lesson__container--layout {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 50px;
      }

    </style>
  </head>
