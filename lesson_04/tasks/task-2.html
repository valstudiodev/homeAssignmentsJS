<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>Task -2</title>
  </head>

  <body>
    <div class="wrapper">
      <header></header>

      <main class="page-task">
        <div class="page-task__container">
          <h1 class="page-task__title">Task -2</h1>
          <div class="page-task__inner">

            <div class="page-task__text">
              <p>Поступово генерувати 100 випадкових чисел від 1 до 1000. Підрахувати яких
                чисел більше: парних чи непарних.
              </p>
            </div>

            <div class="page-task__script">
              <script>

                if (confirm('Почати тестування?')) {
                  let evenCount = 0
                  let oddCount = 0

                  for (let num = 1; num <= 10; num++) {
                    const randomNum = 1 + Math.floor(Math.random() * 1000)
                    if (randomNum % 2 === 0) {
                      evenCount++
                    } else
                      oddCount++
                  }

                  if (evenCount > oddCount) {
                    document.write(`Even more! `);
                  } else if (evenCount < oddCount) {
                    document.write(`Odd more! `);
                  } else
                    document.write(`The quantity is equal!`);
                }

              </script>
            </div>

          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <script type="module" src="../../javascript/lesson4.js"></script>
  </body>
</html>
